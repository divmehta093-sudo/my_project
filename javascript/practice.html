  function getTicketPrice(age, isWeekend) {
    if (age >0 && age<=12) return isWeekend?  8+3 : 8;
    else if (age>=13 && age<=17 ) return isWeekend? 12+3 : 12;
    else if (age>=18 && age<=59 ) return isWeekend? 15+3 : 15;
    else if (age<=60) return isWeekend? 10+3 : 10;
    else return -1;
   
  }
  console.log(getTicketPrice(14,false));
